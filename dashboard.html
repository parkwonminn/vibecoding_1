<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반려동물 모니터링 - 대시보드</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
</head>
<body class="dashboard">
    <header class="dashboard-header">
        <h1>🐾 반려동물 모니터링</h1>
        <div class="header-actions">
            <button type="button" class="btn btn-theme" id="themeToggle" title="테마 전환">🌙</button>
            <button type="button" class="btn btn-secondary" onclick="location.href='gallery.html'">기록장</button>
            <button type="button" class="btn btn-secondary" onclick="location.href='settings.html'">설정</button>
            <button type="button" class="btn btn-logout" id="logoutBtn">로그아웃</button>
        </div>
    </header>

    <main class="video-section">
        <!-- 캡처 대상: 비디오 + 상태 오버레이 -->
        <div class="video-wrapper" id="captureArea">
        <!-- 실시간 영상 스트리밍 영역 -->
        <div class="video-container" id="videoContainer">
            <video id="streamVideo" autoplay muted playsinline style="display: none;"></video>
            <div class="video-placeholder" id="videoPlaceholder">
                <span class="placeholder-icon">📹</span>
                <span>실시간 영상 스트리밍 영역</span>
                <span style="font-size: 0.85rem; margin-top: 8px;">(실제 구현 시 카메라/스트리밍 서버 연결 필요)</span>
            </div>
        </div>

        <!-- 반려동물 상태 표시 오버레이 -->
        <div class="status-overlay" id="statusOverlay">
            <div class="status-badge" id="statusBadge">
                <span id="statusIcon">🟢</span>
                <span id="statusText">반려동물 있음</span>
            </div>
            <div class="status-time" id="statusTime">⏱ 마지막 감지 시간: 14:32</div>
        </div>
        </div>

        <!-- 화면 캡처 버튼 -->
        <div class="video-controls">
            <button type="button" class="btn btn-primary" id="captureBtn">📷 현재 화면 캡처 (다운로드 + 기록장 저장)</button>
        </div>

        <!-- 음성 송출 영역 -->
        <section class="voice-section">
            <h3>🔊 음성 송출</h3>
            <div class="voice-input-group">
                <input type="text" id="voiceInput" placeholder="말할 내용을 입력하세요..." maxlength="200">
                <button type="button" class="btn btn-primary" id="voiceSendBtn">음성 보내기</button>
            </div>
            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 12px;">
                ※ 현재는 브라우저에서 텍스트를 음성으로 재생합니다. 실제 홈 기기로 전달하려면 서버 연동이 필요합니다.
            </p>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
