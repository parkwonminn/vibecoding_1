<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반려동물 모니터링 - 커뮤니티/기록장</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
</head>
<body class="dashboard">
    <header class="dashboard-header">
        <h1>🐾 반려동물 모니터링</h1>
        <div class="header-actions">
            <button type="button" class="btn btn-theme" id="themeToggle" title="테마 전환">🌙</button>
            <button type="button" class="btn btn-secondary" onclick="location.href='dashboard.html'">대시보드</button>
            <button type="button" class="btn btn-secondary" onclick="location.href='settings.html'">설정</button>
            <button type="button" class="btn btn-logout" id="logoutBtn">로그아웃</button>
        </div>
    </header>

    <main class="gallery-page">
        <div class="gallery-header">
            <h1>📒 커뮤니티 / 기록장</h1>
            <p>반려동물의 일기와 캡처한 사진을 모아보세요.</p>
        </div>

        <!-- 탭 -->
        <div class="gallery-tabs">
            <button type="button" class="tab-btn active" data-tab="photos">📷 사진첩</button>
            <button type="button" class="tab-btn" data-tab="diary">📝 일기</button>
        </div>

        <!-- 사진첩 탭 -->
        <section class="gallery-tab-content active" id="tab-photos">
            <p class="tab-hint">대시보드에서 캡처한 사진이 여기에 저장됩니다.</p>
            <div class="photo-grid" id="photoGrid"></div>
            <div class="empty-state" id="photoEmpty">
                <span class="empty-icon">🖼️</span>
                <p>저장된 사진이 없습니다.</p>
                <p class="empty-sub">대시보드에서 화면을 캡처해보세요!</p>
            </div>
        </section>

        <!-- 일기 탭 -->
        <section class="gallery-tab-content" id="tab-diary">
            <div class="diary-input-section">
                <textarea id="diaryInput" placeholder="오늘 반려동물과 무슨 일이 있었나요? 일기를 작성해보세요..." rows="4"></textarea>
                <button type="button" class="btn btn-primary" id="diaryAddBtn">일기 작성</button>
            </div>
            <div class="diary-list" id="diaryList"></div>
            <div class="empty-state" id="diaryEmpty">
                <span class="empty-icon">📝</span>
                <p>작성된 일기가 없습니다.</p>
                <p class="empty-sub">첫 번째 일기를 작성해보세요!</p>
            </div>
        </section>
    </main>

    <!-- 사진 상세 모달 -->
    <div class="modal" id="photoModal">
        <div class="modal-backdrop" data-close></div>
        <div class="modal-content">
            <button type="button" class="modal-close" data-close>×</button>
            <img id="modalImage" src="" alt="캡처 이미지">
            <div class="modal-info">
                <input type="text" id="modalMemo" placeholder="메모 추가...">
                <div class="modal-actions">
                    <a id="modalDownload" class="btn btn-secondary" download>다운로드</a>
                    <button type="button" class="btn btn-danger" id="modalDelete">삭제</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/gallery.js"></script>
</body>
</html>
