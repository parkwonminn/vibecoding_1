<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반려동물 모니터링 - 설정</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
</head>
<body class="dashboard">
    <header class="dashboard-header">
        <h1>🐾 반려동물 모니터링</h1>
        <div class="header-actions">
            <button type="button" class="btn btn-theme" id="themeToggle" title="테마 전환">🌙</button>
            <button type="button" class="btn btn-secondary" onclick="location.href='dashboard.html'">대시보드</button>
            <button type="button" class="btn btn-secondary" onclick="location.href='gallery.html'">기록장</button>
            <button type="button" class="btn btn-logout" id="logoutBtn">로그아웃</button>
        </div>
    </header>

    <main class="settings-page">
        <a href="dashboard.html" class="back-link">← 대시보드로 돌아가기</a>

        <div class="settings-header">
            <h1>설정</h1>
            <p>사용자 정보 및 비밀번호를 관리합니다.</p>
        </div>

        <!-- 사용자 정보 -->
        <section class="settings-card">
            <h2>사용자 정보</h2>
            <div class="form-group">
                <label>아이디</label>
                <input type="text" id="displayUsername" readonly disabled>
            </div>
            <div class="form-group">
                <label>가입일</label>
                <input type="text" id="displayJoinDate" value="데모 계정" readonly disabled>
            </div>
        </section>

        <!-- 반려동물 이름 -->
        <section class="settings-card">
            <h2>반려동물 이름</h2>
            <div class="form-group">
                <label for="petName">이름 설정</label>
                <input type="text" id="petName" placeholder="예: 초코 (비워두면 '반려동물'로 표시)">
            </div>
            <p class="form-hint">대시보드에 "초코가 집에 있어요!"처럼 표시됩니다.</p>
        </section>

        <!-- 알림 및 메일 설정 -->
        <section class="settings-card">
            <h2>📧 알림 및 메일 설정</h2>
            <div class="form-group switch-group">
                <label class="switch-label">
                    <span class="switch-text">반려동물 부재 시 메일 받기</span>
                    <input type="checkbox" id="mailNotificationSwitch" class="switch-input">
                    <span class="switch-slider"></span>
                </label>
            </div>
            <div class="form-group">
                <label for="mailRecipient">수신 메일 주소</label>
                <input type="email" id="mailRecipient" placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="mailDelay">알림 지연 시간</label>
                <select id="mailDelay">
                    <option value="10">10초</option>
                    <option value="30" selected>30초</option>
                    <option value="60">1분</option>
                    <option value="120">2분</option>
                    <option value="300">5분</option>
                </select>
            </div>
            <p class="form-hint">반려동물이 지정한 시간 이상 감지되지 않을 때 메일을 보냅니다.</p>
            <p class="form-hint" style="margin-top: 4px;">※ 실제 메일 발송은 백엔드 서버 연동이 필요합니다.</p>
        </section>

        <!-- AI 및 카메라 감지 설정 -->
        <section class="settings-card">
            <h2>📷 AI 및 카메라 감지 설정</h2>
            <div class="form-group">
                <label>모터 추적 속도</label>
                <select id="motorSpeed">
                    <option value="slow">느리게</option>
                    <option value="medium" selected>중간</option>
                    <option value="fast">빠르게</option>
                </select>
            </div>
            <p class="form-hint">카메라 모터가 반려동물을 추적할 때 회전하는 속도입니다.</p>
        </section>

        <!-- 테마 설정 -->
        <section class="settings-card">
            <h2>테마 설정</h2>
            <div class="form-group">
                <label>화면 모드</label>
                <div class="theme-toggle-group">
                    <button type="button" class="btn theme-option" data-theme="dark">🌙 다크 모드</button>
                    <button type="button" class="btn theme-option" data-theme="light">☀️ 라이트 모드</button>
                </div>
            </div>
        </section>

        <!-- 비밀번호 변경 -->
        <section class="settings-card">
            <h2>비밀번호 변경</h2>
            <form id="passwordForm">
                <div class="form-group">
                    <label for="currentPassword">현재 비밀번호</label>
                    <input type="password" id="currentPassword" placeholder="현재 비밀번호 입력" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">새 비밀번호</label>
                    <input type="password" id="newPassword" placeholder="새 비밀번호 입력" required minlength="4">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">새 비밀번호 확인</label>
                    <input type="password" id="confirmPassword" placeholder="새 비밀번호 다시 입력" required minlength="4">
                </div>
                <div id="passwordError" class="error-message" style="display: none;"></div>
                <div id="passwordSuccess" class="success-message" style="display: none;"></div>
                <button type="submit" class="btn btn-primary">비밀번호 변경</button>
            </form>
        </section>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
